<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCB Bucket AR</title>
</head>

<body>
    <button onclick="document.getElementById('jcb-bucket-lite-viewer').activateAR()"
        style="background:#fbc02d; color:#000; border:none; border-radius:24px; padding:12px 24px; font-weight:700; cursor:pointer; font-family:sans-serif; display:inline-flex; align-items:center; gap:8px;">View
        JCB Bucket in AR</button>

    <model-viewer id="jcb-bucket-lite-viewer" src="https://vanshg1214.github.io/JCB_AR/models/scene_fixed.glb" ar
        ar-modes="scene-viewer quick-look" ar-scale="fixed" ar-placement="floor"
        style="width:0px; height:0px; position:absolute; visibility:hidden; pointer-events:none;"></model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

</body>

</html>

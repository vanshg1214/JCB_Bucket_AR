<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCB Bucket Web AR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>JCB Bucket Configurator</h1>
        <p>Spatial AR experience</p>
      </header>
      
      <main class="product-card">
        <model-viewer
          src="models/scene_fixed.glb"
          ar
          ar-modes="scene-viewer quick-look"
          ar-scale="fixed"
          ar-placement="floor"
          camera-controls
          touch-action="pan-y"
          shadow-intensity="1.5"
          shadow-softness="0.5"
          auto-rotate
          environment-image="neutral"
          exposure="1.3"
          alt="JCB Bucket in AR"
        >
          <div slot="poster" class="loading-overlay">
            <div class="spinner-container">
              <div class="jcb-spinner"></div>
              <p class="loading-text">Loading 3D JCB Bucket...</p>
            </div>
          </div>
          <button slot="ar-button" class="ar-button">
            View in your space
          </button>

          <!-- Hotspots -->
          <button class="Hotspot" slot="hotspot-1" data-position="0 1.0 -0.3" data-normal="0 1 -1" data-visibility-attribute="visible">
              <div class="HotspotAnnotation">
                  <div class="HotspotHeader">
                      <h3>Attachment Interface</h3>
                      <span class="HotspotClose">&times;</span>
                  </div>
                  <p>Heavy-duty mounting brackets and pins securely connect the bucket to the excavator arm, ensuring reliable performance under high-load conditions.</p>
              </div>
          </button>
          <button class="Hotspot" slot="hotspot-2" data-position="0 0.5 0" data-normal="0 1 0" data-visibility-attribute="visible">
              <div class="HotspotAnnotation">
                  <div class="HotspotHeader">
                      <h3>High-Capacity Bucket</h3>
                      <span class="HotspotClose">&times;</span>
                  </div>
                  <p>Optimized bucket geometry enables efficient scooping, carrying, and unloading of soil, sand, gravel, and construction materials.</p>
              </div>
          </button>
          <button class="Hotspot" slot="hotspot-3" data-position="0 0.15 0.5" data-normal="0 1 1" data-visibility-attribute="visible">
              <div class="HotspotAnnotation">
                  <div class="HotspotHeader">
                      <h3>Hardened Bucket Teeth</h3>
                      <span class="HotspotClose">&times;</span>
                  </div>
                  <p>Wear-resistant steel teeth provide superior ground penetration and enhanced digging performance in demanding environments.</p>
              </div>
          </button>
          <button class="Hotspot" slot="hotspot-4" data-position="0.35 0.5 0.2" data-normal="1 0 0.5" data-visibility-attribute="visible">
              <div class="HotspotAnnotation">
                  <div class="HotspotHeader">
                      <h3>Reinforced Side Protection</h3>
                      <span class="HotspotClose">&times;</span>
                  </div>
                  <p>Integrated wear plates protect critical bucket edges from abrasion, extending service life and reducing maintenance requirements.</p>
              </div>
          </button>
        </model-viewer>
      </main>

      <footer class="app-footer">
        <p>Tested for strict ground locking and 1:1 real-world scaling.</p>
      </footer>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
